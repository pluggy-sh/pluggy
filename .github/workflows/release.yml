name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  # attest-build-provenance signs each release binary with a Sigstore-issued
  # ephemeral certificate bound to this workflow's OIDC identity. `pluggy
  # upgrade` checks the resulting attestation against the binary it just
  # downloaded; a tampered binary fails verification because its sha256 won't
  # match any attestation issued for this repo's release workflow.
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: linux-amd64
            bun-target: bun-linux-x64
            artifact: pluggy-linux-amd64
          - target: linux-arm64
            bun-target: bun-linux-arm64
            artifact: pluggy-linux-arm64
          - target: darwin-amd64
            bun-target: bun-darwin-x64
            artifact: pluggy-darwin-amd64
          - target: darwin-arm64
            bun-target: bun-darwin-arm64
            artifact: pluggy-darwin-arm64
          - target: windows-amd64
            bun-target: bun-windows-x64
            artifact: pluggy-windows-amd64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: get_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
            VERSION=${VERSION#v}
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(date +%Y%m%d-%H%M%S)" >> "$GITHUB_OUTPUT"
          fi

      - name: Update CLI version in src/index.ts
        run: |
          sed -i 's/const CLI_VERSION = ".*";/const CLI_VERSION = "${{ steps.get_version.outputs.version }}";/' src/index.ts
          grep 'const CLI_VERSION' src/index.ts

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p bin
          bun build \
            --compile \
            --target ${{ matrix.bun-target }} \
            --outfile bin/${{ matrix.artifact }} \
            ./src/index.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: bin/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets

          cp artifacts/pluggy-linux-amd64/pluggy-linux-amd64 release-assets/pluggy-linux-amd64
          cp artifacts/pluggy-linux-arm64/pluggy-linux-arm64 release-assets/pluggy-linux-arm64
          cp artifacts/pluggy-darwin-amd64/pluggy-darwin-amd64 release-assets/pluggy-darwin-amd64
          cp artifacts/pluggy-darwin-arm64/pluggy-darwin-arm64 release-assets/pluggy-darwin-arm64
          cp artifacts/pluggy-windows-amd64.exe/pluggy-windows-amd64.exe release-assets/pluggy-windows-amd64.exe

          chmod +x release-assets/pluggy-linux-* release-assets/pluggy-darwin-*

          cp install.sh release-assets/
          cp install.ps1 release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum pluggy-linux-amd64 pluggy-linux-arm64 pluggy-darwin-amd64 pluggy-darwin-arm64 pluggy-windows-amd64.exe > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          # Attests every published binary plus the checksum manifest. A
          # forged binary with a matching forged manifest still fails
          # because neither would carry an attestation issued by this
          # workflow's OIDC identity.
          subject-path: |
            release-assets/pluggy-linux-amd64
            release-assets/pluggy-linux-arm64
            release-assets/pluggy-darwin-amd64
            release-assets/pluggy-darwin-arm64
            release-assets/pluggy-windows-amd64.exe
            release-assets/SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Installation

            ### Windows (PowerShell)
            ```
            irm https://pluggy.sh/install.ps1 | iex
            ```

            ### Unix-like Systems (macOS, Linux)
            ```
            curl -fsSL https://pluggy.sh/install.sh | sh
            ```

            ## Verification

            Each binary is attested with [build provenance](https://docs.github.com/en/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds). To verify a downloaded binary:

            ```
            gh attestation verify pluggy-darwin-arm64 --repo ${{ github.repository }}
            ```

            `pluggy upgrade` performs an equivalent check automatically against the published `SHA256SUMS.txt` manifest and refuses to install a binary whose digest doesn't match.

            ---
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Requires WEBSITE_DISPATCH_TOKEN: a fine-grained PAT scoped to
      # pluggy-sh/pluggy.sh with `actions: write`. The default GITHUB_TOKEN
      # cannot dispatch across repos.
      - name: Trigger pluggy.sh docs rebuild
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            repos/pluggy-sh/pluggy.sh/dispatches \
            -f event_type=pluggy-release \
            -f "client_payload[tag]=${{ github.ref_name }}"

  bump-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    # Skip pre-release tags (e.g. v0.4.0-rc.1) so brew users only see stable
    # versions. Requires HOMEBREW_TAP_TOKEN: fine-grained PAT scoped to
    # pluggy-sh/homebrew-tap with `contents: write` and `pull-requests: write`.
    steps:
      - name: Open tap bump PR
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
          TAP_REPO: pluggy-sh/homebrew-tap
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BRANCH="bump/pluggy-${VERSION}"

          # Fetch authoritative checksums from the release we just published.
          curl -fsSL "https://github.com/pluggy-sh/pluggy/releases/download/${TAG}/SHA256SUMS.txt" -o sums.txt
          sha() { awk -v n="$1" '$2==n {print $1}' sums.txt; }
          SHA_DARWIN_ARM=$(sha pluggy-darwin-arm64)
          SHA_DARWIN_X86=$(sha pluggy-darwin-amd64)
          SHA_LINUX_ARM=$(sha pluggy-linux-arm64)
          SHA_LINUX_X86=$(sha pluggy-linux-amd64)
          for s in "$SHA_DARWIN_ARM" "$SHA_DARWIN_X86" "$SHA_LINUX_ARM" "$SHA_LINUX_X86"; do
            [ -n "$s" ] || { echo "missing sha for one platform" >&2; exit 1; }
          done

          # Clone the tap, swap version + each per-platform sha256, push branch, open PR.
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" tap
          cd tap
          git checkout -b "$BRANCH"
          F=Formula/pluggy.rb

          # version "<old>"  -> version "<new>"
          sed -i -E "s/version \"[^\"]+\"/version \"${VERSION}\"/" "$F"

          # For each per-platform marker, jump to the URL line containing it,
          # advance to the next line, and overwrite the sha256 there. Relies on
          # the formula keeping each url/sha256 pair on consecutive lines.
          bump_sha() {
            local marker="$1" newsha="$2"
            sed -i "\|${marker}\"|{n;s/sha256 \"[0-9a-f]\{64\}\"/sha256 \"${newsha}\"/;}" "$F"
          }
          bump_sha pluggy-darwin-arm64 "$SHA_DARWIN_ARM"
          bump_sha pluggy-darwin-amd64 "$SHA_DARWIN_X86"
          bump_sha pluggy-linux-arm64  "$SHA_LINUX_ARM"
          bump_sha pluggy-linux-amd64  "$SHA_LINUX_X86"

          # Sanity-check: every old sha should be gone.
          for s in "$SHA_DARWIN_ARM" "$SHA_DARWIN_X86" "$SHA_LINUX_ARM" "$SHA_LINUX_X86"; do
            grep -q "$s" "$F" || { echo "sed failed: $s not found in $F" >&2; exit 1; }
          done

          git config user.name  "pluggy-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add "$F"
          git commit -m "chore: bump pluggy to ${VERSION}"
          git push -u origin "$BRANCH"

          gh pr create \
            --repo "$TAP_REPO" \
            --base main \
            --head "$BRANCH" \
            --title "chore: bump pluggy to ${VERSION}" \
            --body "Auto-generated by pluggy-sh/pluggy release workflow for tag \`${TAG}\`."
